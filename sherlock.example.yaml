# Example Sherlock config (M1 surface).
# Copy to sherlock.yaml and edit. M2+ fields can be omitted; defaults apply.

project: sherlock_default

main_system_prompt:
  path: ./prompts/main_system_prompt.md
  domain_hints:
    - "casual conversational assistant"
    - "user mixes Korean and English"

models:
  main:
    provider: anthropic
    model: claude-haiku-4-5-20251001
    api_key_env: ANTHROPIC_API_KEY

  # Background companions are wired in M3+. Declared here so swap is config-only.
  background_summary:
    provider: anthropic
    model: claude-haiku-4-5-20251001
    api_key_env: ANTHROPIC_API_KEY
  background_inference:
    provider: openai
    model: gpt-5.4-mini
    api_key_env: OPENAI_API_KEY

  # v1.12: optional 4th role — LLM-4 the VISUALIZER (renders inline
  # <<sherlock-viz: …>> markers into self-contained HTML/SVG). Unset → the
  # visualizer falls back to the `main` provider, so `visualization` (below) can
  # be turned on with no extra model key. Uncomment to give it its own model:
  # viz:
  #   provider: anthropic
  #   model: claude-haiku-4-5-20251001
  #   api_key_env: ANTHROPIC_API_KEY

  # Open-source-model hosts (OpenAI-compatible, via litellm) work the same way —
  # set provider + the host's model id (as shown on its site) + the key env var.
  # Browse exact model ids in the playground, or each host's /models endpoint.
  #   provider: deepinfra    model: meta-llama/Meta-Llama-3.1-70B-Instruct   api_key_env: DEEPINFRA_API_KEY
  #   provider: together     model: meta-llama/Llama-3.3-70B-Instruct-Turbo  api_key_env: TOGETHER_API_KEY
  #   provider: openrouter   model: deepseek/deepseek-r1                     api_key_env: OPENROUTER_API_KEY
  # Any other OpenAI-compatible host: use provider: openai + api_base: https://…/v1

storage:
  sqlite_path: ./sherlock.db
  vector_db: chroma
  vector_path: ./sherlock_vectors
  embedding:
    # Real semantic memory. `local` = on-device multilingual embedder
    # (fastembed, no API key, Korean+English). REQUIRES the extra:
    #   pip install "sherlock-context[embeddings]"
    # If fastembed/the model is unavailable it falls back to `fake` with a
    # stderr warning. `fake` is a deterministic hash embedder — fine for
    # tests, but NOT semantic (recall/decay are meaningless). For hosted
    # embeddings set provider: openai|voyage|cohere + api_key_env.
    provider: local
    # model: paraphrase-multilingual-MiniLM-L12-v2   # default for `local`

memory:
  k_turn_min: 3
  k_turn_max_adaptive: true

  # v1.12: cross-conversation LONG-TERM memory. LLM-2 promotes a small, durable
  # subset of session facts (identity/health, explicit "remember this", stable
  # preferences/relationships/projects) into a shared sentinel scope; LLM-1
  # recalls them via an always-on USER PROFILE block + a sentinel RAG channel.
  # ON by default in v1.12 — set enabled: false to disable (byte-identical to
  # pre-v1.12). Values below are the real defaults; uncomment to override.
  long_term:
    enabled: true
    # incognito: false            # true = recall existing facts but PAUSE new writes
    # cap: 200                    # hard cap on stored rows (lowest-conf/oldest evicted past it)
    # profile_max_facts: 12       # USER PROFILE block budget — max facts injected per turn
    # profile_max_chars: 1200     # …and max characters (whichever binds first)
    # rag_channel: true           # also expose long-term facts to semantic RAG retrieval
    # auto_export_on_wipe: true   # Markdown backup before any wipe (fail-closed; recoverable)

# Web search (v0.3.0 — multi-provider).
search:
  provider: duckduckgo          # default, no API key needed
  # api_key: ...                # set if you switch to a keyed provider
  # api_key_env: TAVILY_API_KEY # or pull the key from an env var

  always_on: true
  inject_datetime: true

  # Optional per-role overrides. When unset, both roles inherit `provider`
  # above. Use this when, e.g., you want LLM-3 to run cross-verification
  # against a paid engine but LLM-1's quick lookups can stay free.
  # main_provider: brave
  # main_api_key: BSA-xxxxxxxxxxxx
  # inference_provider: tavily
  # inference_api_key_env: TAVILY_API_KEY

  # Optional (R17): LLMLingua-2 compression of fetched page text before it
  # enters deep-research prompts. Quality-preserving — drops boilerplate
  # tokens inside each page, never restricts which results/pages are used.
  # Requires `pip install "sherlock-context[compress]"`; without the extra
  # installed Sherlock falls back to plain truncation (zero behavior change).
  # deep_research_compress: true

  # ── Deep research — the multi-round research pipeline. Every accuracy feature
  # below is ON by default and byte-identical when off; uncomment to override.
  # Event stream (deep_research.*, verify_skipped, …) is documented in docs/EVENTS.md.
  #
  # LLM-2 accuracy layer: after synthesis the report is re-read against the gathered
  # RAW and mis-extractions/contradictions are CORRECTED (non-destructive), then a
  # whole-report consistency sweep reconciles cross-section disagreements.
  #   off               = skip the accuracy pass entirely
  #   faithfulness      = the no-web report-vs-raw check + consistency sweep (default)
  #   faithfulness+web  = ALSO re-verify the few flagged claims via an LLM-3 web search
  # deep_research_verify: faithfulness
  # deep_research_web_recheck_max: 3           # cap on claims the +web tier re-checks
  #
  # deep_research_parallel_search: true        # v1.11 — run a round's searches concurrently
  #                                            #   (results collected in query order → identical)
  # deep_research_structured_extraction: true  # per-entity {entity, attrs} extraction
  # deep_research_freshness: true              # surface source dates so the model prefers fresh
  # deep_research_fetch_image: true            # harvest a lead image even on info-rich rounds
  # deep_research_reconstruct_from_raw: true   # re-read raw at synthesis — the verify layer
  #                                            #   checks against this; OFF disables verify too
  # deep_research_persist_raw: false           # persist raw fragments to SQLite for later recall
  # deep_research_v3: true                     # the same-model editor pass that runs before verify

# Companion gating (v1.6) — decides per turn whether the BACKGROUND brain
# (LLM-2 compaction, LLM-3 inference) wakes up. LLM-1 always answers, so this
# never delays the user's reply; it only spends companion tokens when a real
# signal appears.
companions:
  mode: cold_start      # default. "off" = byte-identical v1.4; "turbo" = all-on
  profile: strong       # "weak" lowers the escalate threshold for small models
  # The leaky-bucket controls below are tuned defaults — change only if you
  # know the dynamics (decay = de-escalation, Schmitt esc/deesc = hysteresis):
  # decay3: 0.5         # intent (LLM-3) pressure decay per quiet turn
  # decay2: 0.8         # memory (LLM-2) pressure decay per quiet turn
  # esc3: 0.6           # escalate LLM-3 at this pressure; stay loud until < deesc3
  # deesc3: 0.3
  # esc3_deep_signals: 2  # deep tier (notebook + proactive search) needs ≥2 strong signals this turn

# Perception layer (v1.5) — deterministic, pure-stdlib OBSERVED facts (date math,
# script/locale, structural spans, exact arithmetic, freshness) + PRIOR cues fed
# to LLM-1 (and LLM-3). Off by default for slot byte-stability; cold_start turns
# it on automatically via with_callable. Set enabled: true to force it on here.
perception:
  enabled: false
  # max_observations: 12   # per-primitive toggles: dates / scripts / arithmetic /
  # freshness: true        # spans / code / discourse / freshness (all default true)

# LLM-4 inline VISUALIZER (v1.12). When enabled, LLM-1 may drop an inline
# <<sherlock-viz: …>> marker where a diagram/chart helps; LLM-4 renders it into a
# sandboxed-iframe HTML/SVG artifact via generate → lint → self-review → repair.
# OFF by default: the marker protocol is dormant and a stray marker stays
# verbatim (byte-identical). Uses models.viz, else falls back to models.main.
# Values below are the real defaults; uncomment to override.
visualization:
  enabled: false
  # self_review_rounds: 1     # LLM-4 self-critique rounds before a render is accepted
  # max_repair_rounds: 2      # render-repair attempts when an artifact fails the lint
  # timeout_s: 30.0           # per-marker wall-clock budget (best-effort; timeout drops the visual)
  # max_markers_chat: 3       # cap on markers honoured per CHAT reply
  # max_markers_report: 4     # …and per deep-research REPORT
  # max_html_bytes: 64000     # upper bound on one rendered artifact's HTML payload
  # save_artifacts: true      # persist rendered artifacts so a reopened session re-hydrates them

execution:
  # NOTE: the next three are ADVISORY / NOT ENFORCED today. The background
  # companion worker is a single thread (deterministic replay), so
  # parallel_when_possible / max_concurrent_background_tasks do not change
  # concurrency, and cost_cap_per_turn_usd is wired to no spend gate (no per-turn
  # USD cap is enforced). Kept for forward-compat; treat as intent, not controls.
  parallel_when_possible: true            # advisory — not enforced
  max_concurrent_background_tasks: 3      # advisory — not enforced
  cost_cap_per_turn_usd: 0.50             # advisory — NOT enforced (no spend gate)
  fallback_to_sequential_on_local: true   # advisory — not enforced
