# Live evaluation config — uses real provider APIs.
#
# Required env vars (put in .env or export in your shell):
#   ANTHROPIC_API_KEY  — for the main + LLM-2 + LLM-3 roles (Haiku 4.5)
#   (TAVILY_API_KEY)   — optional; falls back to StubSearch if absent
#
# Embedding uses the deterministic Fake provider, which means retrieval
# semantics are weaker than a real embedder. To use OpenAI embeddings,
# add OPENAI_API_KEY and switch the embedding block below.
#
# The evaluator (Gemini 3.1 Flash Lite) goes through the cli-wrapper-unified
# subscription auth and does NOT need any API key here.

project: sherlock_live

main_system_prompt:
  path: ./prompts/main_system_prompt.md
  domain_hints:
    - "casual conversational assistant"
    - "user mixes Korean and English"
    - "the persona may include facts that are NOT user-stated; track provenance carefully"

models:
  main:
    provider: wrapper-claude
    model: claude-haiku-4-5
  # Companions: gemini-2.5-flash-lite (separate quota from 3.1-flash-lite-preview).
  # Tried codex/gpt-5.4-mini in loop-10 attempt — observed ~160s/call wrapper
  # subprocess overhead (likely auth/spawn issue), unusable. 2.5-flash-lite
  # is hardcoded-available in the wrapper and on a separate quota from
  # 3.1-lite-preview.
  background_summary:
    provider: wrapper-gemini
    model: gemini-2.5-flash-lite
  background_inference:
    provider: wrapper-gemini
    model: gemini-2.5-flash-lite

storage:
  sqlite_path: ./live_runs/sherlock.db
  vector_db: chroma
  vector_path: ./live_runs/sherlock_vectors
  embedding:
    # v0.5.0: real local embeddings by default (fastembed, multilingual,
    # no API key). Falls back to fake with a warning if fastembed/model
    # is unavailable. Install: pip install sherlock[embeddings]
    provider: local
    model: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
    # For a keyed provider instead:
    # provider: openai
    # model: text-embedding-3-small
    # api_key_env: OPENAI_API_KEY
    # For hermetic offline tests:
    # provider: fake

memory:
  k_turn_min: 3
  k_turn_max: 8
  # SPEC §4.2: LLM-2 fires on triggers (n turns OR topic change OR context saturation).
  # 5 is the sweet spot — every 5 turns is enough to keep summaries fresh
  # without over-emitting paraphrase. Combined with LLM-3's on-demand
  # trigger this cuts ~50% of background-call time.
  summarize_every_n_turns: 5
  topic_change_similarity_threshold: 0.4
  rag_top_k: 6
  decay:
    warm_after_turns: 2
    cold_after_turns: 8
    forgotten_after_turns: 24

search:
  # v0.3.0: multi-provider. Default is DuckDuckGo (no key needed).
  # Switch to a keyed provider (tavily/brave/valyu) when you want
  # higher-quality results or per-engine extract endpoints.
  provider: duckduckgo
  # api_key: ...
  # api_key_env: TAVILY_API_KEY
  always_on: true
  inject_datetime: true
  # Optional per-role split — see sherlock.example.yaml for details.
  # main_provider: duckduckgo
  # inference_provider: tavily
  # inference_api_key_env: TAVILY_API_KEY

inference:
  # SPEC §10.4: LLM-3 dormant first N turns to avoid uninformed inference.
  cold_start_turns: 10
  confidence_threshold: 0.4
  evolution_enabled: true

bootstrap:
  # Loop 7+: Bootstrap-authored prompts have been inconsistent across runs
  # — some lacked the tool/pin discipline that loops 4-6 needed. Switching
  # to DEFAULT_LLM2_PROMPT + DEFAULT_LLM3_PROMPT (which carry the discipline
  # rules verbatim) for reproducibility and direct prompt control.
  auto_run_on_init: false
  carry_over_user_patterns: true
  require_user_confirmation: false
