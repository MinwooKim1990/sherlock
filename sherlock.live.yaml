# Live evaluation config — uses real provider APIs.
#
# Required env vars (put in .env or export in your shell):
#   ANTHROPIC_API_KEY  — for the main + LLM-2 + LLM-3 roles (Haiku 4.5)
#   (TAVILY_API_KEY)   — optional; falls back to StubSearch if absent
#
# Embedding uses the deterministic Fake provider, which means retrieval
# semantics are weaker than a real embedder. To use OpenAI embeddings,
# add OPENAI_API_KEY and switch the embedding block below.
#
# The evaluator (Gemini 3.1 Flash Lite) goes through the cli-wrapper-unified
# subscription auth and does NOT need any API key here.

project: sherlock_live

main_system_prompt:
  path: ./prompts/main_system_prompt.md
  domain_hints:
    - "casual conversational assistant"
    - "user mixes Korean and English"
    - "the persona may include facts that are NOT user-stated; track provenance carefully"

models:
  main:
    provider: wrapper-claude
    model: claude-haiku-4-5
  # Summarizer + inferer: switched to codex/gpt-5.4-mini after observing
  # that gemini-3.1-flash-lite-preview rate-limits affected BOTH the
  # evaluator and the companion runtime providers — loop-9 returned empty
  # Section 2/3/4 because every LLM-2/LLM-3 call was silently failing.
  # gpt-5.4-mini via wrapper is similarly fast (~3-4s/call) but on a
  # separate quota.
  background_summary:
    provider: wrapper-codex
    model: gpt-5.4-mini
  background_inference:
    provider: wrapper-codex
    model: gpt-5.4-mini

storage:
  sqlite_path: ./live_runs/sherlock.db
  vector_db: chroma
  vector_path: ./live_runs/sherlock_vectors
  embedding:
    provider: fake
    model: fake-embedding
    # To use real embeddings instead, swap to:
    # provider: openai
    # model: text-embedding-3-small
    # api_key_env: OPENAI_API_KEY

memory:
  k_turn_min: 3
  k_turn_max: 8
  summarize_every_n_turns: 3
  topic_change_similarity_threshold: 0.4
  rag_top_k: 6
  decay:
    warm_after_turns: 2
    cold_after_turns: 8
    forgotten_after_turns: 24

search:
  provider: tavily
  api_key_env: TAVILY_API_KEY
  always_on: true
  inject_datetime: true

inference:
  cold_start_turns: 0
  confidence_threshold: 0.4
  evolution_enabled: true

bootstrap:
  # Loop 7+: Bootstrap-authored prompts have been inconsistent across runs
  # — some lacked the tool/pin discipline that loops 4-6 needed. Switching
  # to DEFAULT_LLM2_PROMPT + DEFAULT_LLM3_PROMPT (which carry the discipline
  # rules verbatim) for reproducibility and direct prompt control.
  auto_run_on_init: false
  carry_over_user_patterns: true
  require_user_confirmation: false
