# Opus ablation config — large-model worker test.
#
# Same architecture as sherlock.live.yaml but workers swapped to
# claude-opus-4-5 (largest hardcoded-available model in the wrapper).
# Purpose: measure whether the Sherlock architecture's score ceiling is
# the workers (small models = ceiling 67-68) or the architecture itself.
#
# If opus hits ≥80, the architecture is sound and the haiku-class run
# was bottlenecked by worker capability.
# If opus also stalls in the high 60s/low 70s, the architecture itself
# is the limit and the next move is structural.

project: sherlock_opus_ablation

main_system_prompt:
  path: ./prompts/main_system_prompt.md
  domain_hints:
    - "casual conversational assistant"
    - "user mixes Korean and English"
    - "the persona may include facts that are NOT user-stated; track provenance carefully"

models:
  main:
    provider: wrapper-claude
    model: claude-opus-4-5
  background_summary:
    provider: wrapper-claude
    model: claude-opus-4-5
  background_inference:
    provider: wrapper-claude
    model: claude-opus-4-5

storage:
  sqlite_path: ./live_runs/sherlock.db
  vector_db: chroma
  vector_path: ./live_runs/sherlock_vectors
  embedding:
    provider: fake
    model: fake-embedding

memory:
  k_turn_min: 3
  k_turn_max: 8
  summarize_every_n_turns: 5
  topic_change_similarity_threshold: 0.4
  rag_top_k: 6
  decay:
    warm_after_turns: 2
    cold_after_turns: 8
    forgotten_after_turns: 24

search:
  provider: tavily
  api_key_env: TAVILY_API_KEY
  always_on: true
  inject_datetime: true

inference:
  cold_start_turns: 10
  confidence_threshold: 0.4
  evolution_enabled: true

bootstrap:
  auto_run_on_init: false
  carry_over_user_patterns: true
  require_user_confirmation: false
