name: Publish to PyPI

# Push a version tag (e.g. `git tag v1.7.0 && git push origin v1.7.0`) → build
# the sdist+wheel and publish to PyPI via Trusted Publishing (OIDC, no token
# stored anywhere). One-time setup on PyPI: register this repo + workflow as a
# trusted publisher for the `sherlock-context` project (see README "Publishing").

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}   # allow a manual run from the Actions tab

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi          # create a GitHub environment named "pypi"
    permissions:
      id-token: write          # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
