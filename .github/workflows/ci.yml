name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff + black — blocking)
        run: |
          ruff check .
          black --check .
      - name: Tests
        # Run unit + integration in SEPARATE processes. The suite constructs a
        # chromadb PersistentClient per agent-creating test; enough of them in ONE
        # process eventually stalls chromadb's backend startup. Two processes keep
        # each run under that ceiling — same coverage, both green.
        run: |
          pytest tests/unit -q
          pytest tests/integration -q
      - name: Probe mechanics (fake LLM, no network/tokens)
        run: python -m evaluation.probe_eval --probes evaluation/probes/ --fake-llm --threshold 0.0
