name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff + black — blocking)
        run: |
          ruff check .
          black --check .
      - name: Tests
        run: pytest tests/ -q
      - name: Probe mechanics (fake LLM, no network/tokens)
        run: python -m evaluation.probe_eval --probes evaluation/probes/ --fake-llm --threshold 0.0
